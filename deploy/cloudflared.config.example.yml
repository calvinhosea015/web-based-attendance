# Named Cloudflare tunnel — stable hostname (does not change on reboot).
# Generated by scripts/setup-named-tunnel.ps1 — do not edit tunnel/credentials paths by hand.
#
# Requires a domain on Cloudflare (free plan is fine), e.g. api.yourdomain.com

tunnel: REPLACE_TUNNEL_ID
credentials-file: D:\Calvin\cloudflared\REPLACE_TUNNEL_ID.json
origincert: D:\Calvin\cloudflared\cert.pem

ingress:
  - hostname: api.yourdomain.com
    service: http://127.0.0.1:5001
  - service: http_status:404
