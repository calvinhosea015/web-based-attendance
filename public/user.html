<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n-title="userTitle">User Dashboard - Office Attendance</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1 data-i18n="userHeader">Check In</h1>
      <p data-i18n="userSubtext">1) Pick your office. 2) Update your location. 3) Tap Check In.</p>
      <div class="lang-switcher">
        <label>
          <span data-i18n="languageLabel">Language</span>
          <select id="locale-select">
            <option value="en">English</option>
            <option value="id">Bahasa Indonesia</option>
          </select>
        </label>
      </div>
    </header>

    <div class="card">
      <div class="status-panel">
        <div class="info-box">
          <strong data-i18n="loggedInAsLabel">Logged in as</strong>
          <span id="session-user">Loading...</span>
        </div>
        <div class="info-box">
          <strong data-i18n="accountEmailLabel">Account email</strong>
          <span id="session-email">Loading...</span>
        </div>
        <div class="info-box">
          <strong data-i18n="selectedOfficeLabel">Selected office</strong>
          <span id="office-name">Loading...</span>
        </div>
        <div class="info-box">
          <strong data-i18n="officeLocationLabel">Office location</strong>
          <span id="office-location">Loading...</span>
        </div>
        <div class="info-box">
          <strong data-i18n="allowedRadiusLabel">Allowed radius</strong>
          <span id="office-radius">Loading...</span>
        </div>
        <div class="info-box">
          <strong data-i18n="locationStatusLabel">Location status</strong>
          <span id="geo-status" data-i18n="requestingLocation">Waiting for permission...</span>
        </div>
        <div class="info-box">
          <strong data-i18n="currentStatusLabel">Current status</strong>
          <span id="check-status">Loading...</span>
        </div>
      </div>

      <form id="checkin-form" class="form-card">
        <label>
          <span data-i18n="chooseOfficeLabel">Choose office</span>
          <select id="office" name="office" required>
            <option value="" data-i18n="loadingOffices">Loading offices...</option>
          </select>
        </label>

        <label>
          <span data-i18n="noteLabel">Note</span>
          <input type="text" id="note" name="note" placeholder="Optional note" data-i18n-placeholder="notePlaceholder" />
        </label>

        <button type="button" id="update-location" class="secondary" data-i18n="updateLocationButton">Update location</button>
        <button type="button" id="checkin-button" data-i18n="checkInButton">Check In</button>
        <button type="button" id="checkout-button" class="secondary" data-i18n="checkOutButton">Check Out</button>
        <input type="hidden" id="latitude" name="latitude" />
        <input type="hidden" id="longitude" name="longitude" />
      </form>

      <div id="message" class="message"></div>

      <div class="links">
        <a class="button secondary" id="logout-button" href="#" data-i18n="logoutButton">Logout</a>
        <a class="button" href="admin.html" data-i18n="adminDashboardButton">Admin Dashboard</a>
      </div>
    </div>
  </div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
