<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="indexTitle">Attendance App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1 data-i18n="indexHeader">Attendance App</h1>
        <p data-i18n="indexSubtext">Tap the button below to get started.</p>
        <div class="lang-switcher">
          <label>
            <span data-i18n="languageLabel">Language</span>
            <select id="locale-select">
              <option value="en">English</option>
              <option value="id">Bahasa Indonesia</option>
            </select>
          </label>
        </div>
      </header>

      <div class="card">
        <div class="links">
          <a class="button" href="login.html?next=user.html" data-i18n="userLoginButton">User Login</a>
          <a class="button secondary" href="login.html?next=admin.html" data-i18n="adminLoginButton">Admin Login</a>
        </div>
      </div>
    </div>
    <script src="i18n.js"></script>
