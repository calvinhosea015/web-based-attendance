<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n-title="loginTitle">Login - Attendance</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1 data-i18n="loginHeader">Welcome Back</h1>
        <p data-i18n="loginSubtext">Enter your username and password to continue.</p>
        <div class="lang-switcher">
          <label>
            <span data-i18n="languageLabel">Language</span>
            <select id="locale-select">
              <option value="en">English</option>
              <option value="id">Bahasa Indonesia</option>
            </select>
          </label>
        </div>
      </header>

      <div class="card">
        <form id="login-form">
          <label>
            <span data-i18n="usernameLabel">Username</span>
            <input type="text" id="username" name="username" placeholder="admin or user" data-i18n-placeholder="usernamePlaceholder" required />
            <small data-i18n="loginHint">Try admin / admin123 or user / user123</small>
          </label>

          <label>
            <span data-i18n="passwordLabel">Password</span>
            <input type="password" id="password" name="password" placeholder="Password" data-i18n-placeholder="passwordPlaceholder" required />
          </label>

          <button type="submit" data-i18n="loginButton">Sign In</button>
          <input type="hidden" id="next-page" value="user.html" />
        </form>

        <div id="message" class="message"></div>

        <div class="links">
          <a class="button secondary" href="index.html" data-i18n="backButton">Back to home</a>
        </div>
      </div>
    </div>

    <script src="i18n.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const nextPage = params.get('next') || 'user.html';
      const nextInput = document.getElementById('next-page');
      const messageEl = document.getElementById('message');

      nextInput.value = nextPage;

      function setMessage(text, type = 'error') {
        messageEl.textContent = text;
        messageEl.className = `message ${type}`;
      }

      document.getElementById('login-form').addEventListener('submit', async event => {
        event.preventDefault();
        setMessage('');

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();
        const next = nextInput.value;

        if (!username || !password) {
          setMessage(i18n.t('pleaseEnterCredentials'));
          return;
        }

        try {
          const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });

          const data = await response.json();
          if (data.ok) {
            window.location.href = next;
          } else {
            setMessage(data.error || i18n.t('loginFailed'));
          }
        } catch (error) {
          setMessage(`${i18n.t('networkErrorPrefix')} ${error.message}`);
    async function checkSession() {
      try {
        const response = await fetch('/api/me');
        const data = await response.json();
        if (data.ok && data.user) {
          window.location.href = data.user.role === 'admin' ? '/admin.html' : '/user.html';
        }
      } catch (error) {
        // ignore
      }
    }

    checkSession();
  </script>
</body>
</html>
