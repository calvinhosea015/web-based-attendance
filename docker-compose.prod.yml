services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    # ponytail: guardrails only (host has 32GB / 20 threads). Postgres for an attendance
    # app is light; this just stops a runaway query from eating the whole box.
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    environment:
      POSTGRES_USER: attendance
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: attendance
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U attendance -d attendance']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    # ponytail: guardrails only (host has 32GB / 20 threads). A leak gets the container
    # OOM-killed (then restarted) instead of slowly starving the host. Bump memory if
    # Excel exports OOM (exit 137) on big datasets.
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
    environment:
      NODE_ENV: production
      PORT: 5001
      SERVE_FRONTEND: 'true'
      DATABASE_URL: postgresql://attendance:${POSTGRES_PASSWORD}@db:5432/attendance
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.production}
      COOKIE_SECRET: ${COOKIE_SECRET:-${JWT_SECRET}}
      ALLOWED_ORIGINS: https://${DOMAIN:?set DOMAIN in .env.production}
    env_file:
      - path: .env.production
        required: false
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
