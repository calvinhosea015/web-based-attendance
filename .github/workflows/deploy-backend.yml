# Deploy backend to your Windows PC when backend/ changes on main.
# Frontend on Vercel already redeploys on its own.
# Manual redeploy: push to main or run "Deploy backend" workflow (workflow_dispatch).
#
# Required GitHub repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST       — SSH host (e.g. id6.tunnel.my.id)
#   DEPLOY_PORT       — SSH port (e.g. 11118 when using a tunnel; omit only if port 22)
#   DEPLOY_USER       — Windows username (e.g. calvin)
#   DEPLOY_SSH_KEY    — private key for SSH (see scripts/setup-github-deploy.ps1)
#   DEPLOY_REPO_PATH  — absolute path on server (e.g. D:\Calvin\web-based-attendance)

name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/deploy-backend.ps1'
      - 'scripts/install-backend-service.ps1'
      - 'scripts/setup-github-deploy.ps1'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ secrets.DEPLOY_PORT }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 15m
          script_stop: true
          script: |
            powershell -NoProfile -ExecutionPolicy Bypass -Command "$r='${{ secrets.DEPLOY_REPO_PATH }}'.Replace('\','/'); & ($r + '/scripts/deploy-backend.ps1') -RepoRoot $r"
